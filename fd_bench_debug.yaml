global:
  port: 2786
  CUDA_VISIBLE_DEVICES: 0,1,2,3
  extra_ports_offsets: [100, 200, 300]  # metrics(+100), engine-worker-queue(+200), cache-queue(+300)
  health_url: "http://127.0.0.1:2786/health"
  server_ready_timeout: 1000   # 等待服务启动最长秒数
  shutdown_wait: 20           # kill server 后等待 GPU 显存释放的秒数
  results_dir: "./results"    # 结果目录（相对于本文件所在目录）

# ── 数据集路径 ────────────────────────────────────────────────────────────────
# 中短数据集：输入~2k 输出~1k
# /workspace3/fxy/sglang/debug/0724_ShareGPT_range_1800_3000_num_5000_FD.jsonl  (n=5000)
# 多轮数据集：输入~8k 输出~200
# /workspace3/fxy/sglang/debug/20260302_browsecomp_plus_processed_num_830_fd.jsonl  (n=830)
# 长输入数据集：输入~36k 输出~50
# /workspace3/fxy/sglang/debug/260226_loogle_longdep_NarrativeQA_mix_prefix_input_avg_35k_num_6748_with_only_max_tokens_for_fastdeploy.jsonl  (n=6748)
# 长输出数据集：输入~680 输出~18k
# /workspace3/fxy/sglang/debug/eb5_ppo_data_v1126_reasoning_merge_data_v1_for_release_gbs384_text_shuffled_250_with_output_tokens.jsonl  (n=250)

