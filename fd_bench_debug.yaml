  - name: fd_中短_MTP_c512
    server: |
      export CUDA_VISIBLE_DEVICES=0,1,2,3
      export PYTHONPATH="/workspace3/fxy/FastDeploy:$PYTHONPATH"
      export FD_SAMPLING_CLASS=rejection
      export FD_ENGINE_TASK_QUEUE_WITH_SHM=1
      export FD_CUSTOM_AR_MAX_SIZE_MB=8
      model_path=/workspace3/fxy/models/GLM-4.5-Air
      /root/miniconda3/envs/fxy_py12_fa4/bin/python -m fastdeploy.entrypoints.openai.api_server \
          --model $model_path \
          --port 2786 \
          --metrics-port 2886 \
          --engine-worker-queue-port 2986 \
          --cache-queue-port 3086 \
          --max-model-len 32768 \
          --max-num-seqs 512 \
          --tensor-parallel-size 4 \
          --enable-overlap-schedule \
          --enable-flashinfer-allreduce-fusion \
          --quantization wfp8afp8 \
          --speculative-config '{"method": "mtp", "num_speculative_tokens": 1, "num_model_steps": 1, "model": "'$model_path'"}' \
          --graph-optimization-config '{"use_cudagraph": true, "draft_model_use_cudagraph": true}'
    infer: |
      /root/miniconda3/envs/fxy_sglang/bin/python \
          /workspace3/fxy/FastDeploy/benchmarks/benchmark_serving.py \
          --backend openai-chat \
          --model GLM-4.5-Air \
          --endpoint /v1/chat/completions \
          --host 127.0.0.1 --port 2786 \
          --dataset-name EBChat \
          --dataset-path /workspace3/fxy/sglang/debug/0724_ShareGPT_range_1800_3000_num_5000_FD.jsonl \
          --hyperparameter-path /workspace3/fxy/sglang/debug/request.yaml \
          --percentile-metrics ttft,tpot,itl,e2el,s_ttft,s_itl,s_e2el,s_decode,input_len,s_input_len,output_len \
          --metric-percentiles 80,95,99,99.9,99.95,99.99 \
          --num-prompts 5000 \
          --max-concurrency 512

