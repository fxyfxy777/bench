    server: |
      export CUDA_VISIBLE_DEVICES=0,1,2,3
      export PYTHONPATH=/workspace3/fxy/sglang/python:$PYTHONPATH
      export LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libstdc++.so.6
      /root/miniconda3/envs/fxy_sglang/bin/python -m sglang.launch_server \
          --model-path /workspace2/fanxiangyu/models/GLM-4.5-Air-FP8 \
          --host 0.0.0.0 --port 3015 \
          --tensor-parallel-size 4 \
          --max-running-requests 512 \
          --speculative-algorithm EAGLE \
          --speculative-num-steps 1 \
          --speculative-eagle-topk 1 \
          --speculative-num-draft-tokens 1 \
          --context-length 32768
    infer: |
      /root/miniconda3/envs/fxy_sglang/bin/python \
          /workspace3/fxy/FastDeploy/benchmarks/benchmark_serving.py \
          --backend openai-chat \
          --model GLM-4.5-Air \
          --endpoint /v1/chat/completions \
