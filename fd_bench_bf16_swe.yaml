global:
  port: 2786
  CUDA_VISIBLE_DEVICES: 4,5,6,7
  extra_ports_offsets: [100, 200, 300]  # metrics(+100), engine-worker-queue(+200), cache-queue(+300)
  health_url: "http://127.0.0.1:2786/health"
  server_ready_timeout: 1000   # 等待服务启动最长秒数
  shutdown_wait: 20           # kill server 后等待 GPU 显存释放的秒数
  results_dir: "./results"    # 结果目录（相对于本文件所在目录）

# ── 数据集路径 ────────────────────────────────────────────────────────────────
# 中短数据集：输入~2k 输出~1k
# /workspace3/fxy/sglang/debug/0724_ShareGPT_range_1800_3000_num_5000_FD.jsonl  (n=5000)
# 多轮数据集：输入~8k 输出~200
# /workspace3/fxy/sglang/debug/20260302_browsecomp_plus_processed_num_830_fd.jsonl  (n=830)
# 长输入数据集：输入~36k 输出~50
# /workspace3/fxy/sglang/debug/260226_loogle_longdep_NarrativeQA_mix_prefix_input_avg_35k_num_6748_with_only_max_tokens_for_fastdeploy.jsonl  (n=6748)
# 长输出数据集：输入~680 输出~18k
# /workspace3/fxy/sglang/debug/eb5_ppo_data_v1126_reasoning_merge_data_v1_for_release_gbs384_text_shuffled_250_with_output_tokens.jsonl  (n=250)

experiments:
  # ════════════════════════════════════════════════════════════════════════════
  # 三、长输入数据集  输入:36k  输出:50
  #   baseline：默认配置
  #   FA4_prefill_chunk_cpucache：FA4 + prefill num + chunksize + cpu cache
  # ════════════════════════════════════════════════════════════════════════════
  

  # ════════════════════════════════════════════════════════════════════════════
  # 消融实验：swap-space / max-num-batched-tokens / MAX_PREFILL_NUM 各自的影响
  #   baseline : swap=512, batched=32k, MAX_PREFILL_NUM=128  (H卡原始参数)
  #   消融_swap : swap=16,  其余同baseline
  #   消融_batched: batched=64k, 其余同baseline
  #   消融_prefill: MAX_PREFILL_NUM 不设(默认=3), 其余同baseline
  # ════════════════════════════════════════════════════════════════════════════

  - name: fd_长输入_H卡参数_maxlen65k_batched32k_swap512_c512
    server: |
      export CUDA_VISIBLE_DEVICES=4,5,6,7
      export PYTHONPATH="/workspace3/fxy/FastDeploy:$PYTHONPATH"
      export FD_SAMPLING_CLASS=rejection
      export FD_ENGINE_TASK_QUEUE_WITH_SHM=1
      export FD_CUSTOM_AR_MAX_SIZE_MB=8
      export MAX_PREFILL_NUM=128
      model_path=/workspace3/fxy/models/GLM-4.5-Air
      /root/miniconda3/envs/fxy_py12_fa4/bin/python -m fastdeploy.entrypoints.openai.api_server \
          --model $model_path \
          --port 2786 \
          --max-model-len 65536 \
          --max-num-seqs 512 \
          --tensor-parallel-size 4 \
          --enable-overlap-schedule \
          --max-long-partial-prefills 128 \
          --max-num-partial-prefills 128 \
          --max-num-batched-tokens 32768 \
          --swap-space 512
    infer: |
      /root/miniconda3/envs/fxy_sglang/bin/python /workspace3/fxy/FastDeploy/benchmarks/benchmark_serving.py \
          --backend openai-chat \
          --model GLM-4.5-Air \
          --endpoint /v1/chat/completions \
          --host 127.0.0.1 --port 2786 \
          --dataset-name EBChat \
          --dataset-path /workspace3/fxy/sglang/debug/260226_loogle_longdep_NarrativeQA_mix_prefix_input_avg_35k_num_6748_with_only_max_tokens_for_fastdeploy.jsonl \
          --hyperparameter-path /workspace3/fxy/sglang/debug/request_changshuru.yaml \
          --percentile-metrics ttft,tpot,itl,e2el,s_ttft,s_itl,s_e2el,s_decode,input_len,s_input_len,output_len \
          --metric-percentiles 80,95,99,99.9,99.95,99.99 \
          --num-prompts 6748 \
          --max-concurrency 512

